<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Question Coach Card Picker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>* { box-sizing: border-box; margin: 0; padding: 0; } body { background: #F2EFE9; font-family: Helvetica, Arial, sans-serif; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;
    const AMBER="#F5A623", AMBER_DARK="#CC8010", TEAL="#1E5A6A", TEAL_LIGHT="#2D7B8E";

    const DIVERGENT_CARDS = [
      { title:"Availability Bias", description:"We tend to ask questions about things that are easy to remember or recall, rather than things that are actually most important.", prompt:"Look back at your list. What parts of this topic still feel unclear, confusing, or only half-understood to you? Write three questions about the things you don't yet have a handle on, the parts of the topic where you feel most unsure." },
      { title:"In-Group Bias", description:"We naturally ask questions that reflect our own background and experience, often without noticing whose perspectives are missing.", prompt:"Think of someone whose relationship to this topic is very different from yours: someone with different experiences, a different background, or different things at stake. Write three questions from the perspective of that person." },
      { title:"Recency Bias", description:"We ask questions shaped by how a topic is being discussed right now, without questioning whether that framing is accurate or just convenient.", prompt:"Think about how this topic might have looked to someone studying it 20 years ago. What questions would have seemed most important then that nobody seems to be asking today? Write three questions that come from that older perspective." },
      { title:"Attribution Error", description:"We tend to ask questions that explain events through either individual actions or systemic forces, but rarely both.", prompt:"Look at your list and identify whether your questions tend to focus on individuals or on systems. Now write three questions that work at the other level. If your questions have been about people, write questions about structures; if they've been about structures, write questions about the people inside them." },
      { title:"False dichotomy", description:"We ask questions that assume only two possibilities exist, cutting out the complexity in between.", prompt:"Find a question on your list that sets up a choice between two things; two sides, two options, two explanations. Ask yourself what the positions are in between and what gets left out when you frame it as either/or. Now write three questions that break that binary open." },
      { title:"Appeal to Novelty", description:"We favour questions about what's new or trending, even when older or less fashionable questions are more important.", prompt:"Look at your list. How many of your questions are about things that are currently in the news or being talked about right now? Write three questions about this topic that would have been just as important 20 years ago, questions that aren't about what's new, but about what has always mattered." },
      { title:"Naturalistic Fallacy", description:"We ask questions that take the current state of things for granted, as if things couldn't be any other way.", prompt:"Look at your questions and find something they seem to be taking for granted, something treated as just the way things are. Write three questions that treat that thing as a choice someone made, rather than a fact of life." },
      { title:"Hasty Generalization", description:"We build questions around a single example or case as if it represents the whole picture.", prompt:"Identify the example, case, or instance that has most shaped your question list. Now imagine three contexts where that example would not apply; different places, populations, or circumstances. Write three questions that would only emerge from those other contexts." },
      { title:"Framing Effect", description:"We ask questions that work within the frame we were given, without questioning whether that frame itself is the right one for us.", prompt:"Look at the words used to describe your topic. Those words carry assumptions about what the topic is really about and what counts as important. Write three questions that push back on those assumptions, questions that would only make sense if you described the topic in completely different terms." },
    ];

    const REFLECTIVE_CARDS = [
      { title:"Confirmation Bias", description:"We're drawn to questions whose answers we've already half-decided, favouring the comfortable over the genuinely open.", prompt:"Go through your questions one by one. For each one, ask yourself honestly: do I already have a preferred answer to this? Note any question where you feel like you do have a preferred answer. Then ask yourself whether those questions are on your list because they matter most, or because they feel safe." },
      { title:"Anchoring", description:"The first questions we write tend to shape everything that follows, even if better directions emerge later.", prompt:"Look at the first three questions you wrote. Now look at the rest of your list. How many of your later questions take the same perspective or make the same assumptions as the first ones? Find one or two questions that point in a genuinely different direction, and ask yourself whether they deserve more attention than you've been giving them." },
      { title:"Sunk Cost Fallacy", description:"If we've put a lot of effort into formulating certain questions, we want to prioritize them even when they're not the most important ones to pursue.", prompt:"Find the questions on your list that you worked hardest to write. Now ask yourself honestly: if someone else had written those questions, would you be as attached to them? Consider how much your rating of each question's importance is influenced by the effort you put into writing it." },
      { title:"The Streetlight Effect", description:"We gravitate toward questions we know how to answer rather than questions that most need answering.", prompt:"Go through your list and sort your questions into two groups: questions you already know how to begin answering, and questions where you genuinely don't know where you'd start. Ask yourself whether you are more likely to pick questions in the first group. If so, ask yourself whether that's because they're the best questions or just the most familiar ones." },
      { title:"Begging the Question", description:"Begging the question means asking a question in a way that already assumes an answer. This can make them feel precise without them being genuinely open.", prompt:"Read each of your questions carefully and ask: does this question only make sense if something is already assumed to be true? If the answer to the question is already smuggled into the way it's worded, it may not be a genuine inquiry. Identify any questions like this and decide whether they should be set aside." },
      { title:"Loaded Question", description:"We ask questions that contain hidden assumptions we haven't examined or justified.", prompt:"Read each of your questions and identify any that contain an embedded claim; something that would need to be proven before the question itself could be fairly asked. For each loaded question you find, ask yourself whether the hidden assumption is actually justified. If not, consider whether it is one of the questions you should prioritize." },
      { title:"Equivocation", description:"We ask questions that only hold together because a key term is being used in two different ways at once.", prompt:"Go through your questions and for each one find the word or phrase it depends on most. Now ask yourself: could that word/phrase mean more than one thing? For any questions that do have potential double meanings, ask yourself if that will make them difficult to research or answer." },
      { title:"Strawman", description:"We direct questions at a simplified or distorted version of a position rather than engaging with its strongest form.", prompt:"Identify any questions on your list that challenge, critique, or push back against a position or claim. For each one, ask yourself: am I engaging with the strongest version of that position, or a version I've simplified in order to challenge it more easily? If the latter, consider whether that question is one worth pursuing." },
      { title:"Self-Censorship", description:"We unconsciously deprioritize questions that feel risky, uncomfortable, or likely to complicate things, even when those questions may be the most worth asking.", prompt:"Scan your list and consider the questions that feel too difficult or too sensitive. Ask yourself honestly: are there any questions I'm avoiding because they make me uncomfortable? Should those questions be prioritized?" },
    ];

    function shuffled(arr) {
      const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a;
    }

    /* ── Card backs ──────────────────────────────────────────────────────────
       White circle: cx=90 cy=114 r=60  →  spans y=54..174  (height 120px)

       DIVERGENT  icon centre y=100 (±22 → top=78, bottom=122)
                  text y=132 / y=148   top-pad=24  bot-pad=26  ✓ centred

       REFLECTIVE icon centre y=100  rings r=20/13/6 (top=80, bottom=120)
                  text y=132 / y=148   top-pad=26  bot-pad=26  ✓ centred
    ──────────────────────────────────────────────────────────────────────── */

    function DivergentBack({ onClick }) {
      const [hov,setHov]=useState(false);
      return (
        <div onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
          style={{cursor:"pointer",borderRadius:14,transition:"transform .2s,box-shadow .2s",
            transform:hov?"scale(1.05) translateY(-5px)":"scale(1)",
            boxShadow:hov?"0 14px 36px rgba(245,166,35,.5)":"0 4px 18px rgba(0,0,0,.2)"}}>
          <svg width="200" height="280" viewBox="0 0 180 252" style={{display:"block",borderRadius:14}}>
            <defs>
              <pattern id="divNet" x="0" y="0" width="54" height="54" patternUnits="userSpaceOnUse">
                <circle cx="5"  cy="5"  r="4" fill="none" stroke={AMBER_DARK} strokeWidth="1.6"/>
                <circle cx="27" cy="27" r="4" fill="none" stroke={AMBER_DARK} strokeWidth="1.6"/>
                <circle cx="49" cy="5"  r="4" fill="none" stroke={AMBER_DARK} strokeWidth="1.6"/>
                <circle cx="5"  cy="49" r="4" fill="none" stroke={AMBER_DARK} strokeWidth="1.6"/>
                <circle cx="49" cy="49" r="4" fill="none" stroke={AMBER_DARK} strokeWidth="1.6"/>
                <circle cx="27" cy="5"  r="2.5" fill="none" stroke={AMBER_DARK} strokeWidth="1"/>
                <circle cx="5"  cy="27" r="2.5" fill="none" stroke={AMBER_DARK} strokeWidth="1"/>
                <circle cx="49" cy="27" r="2.5" fill="none" stroke={AMBER_DARK} strokeWidth="1"/>
                <circle cx="27" cy="49" r="2.5" fill="none" stroke={AMBER_DARK} strokeWidth="1"/>
                <line x1="5"  y1="5"  x2="27" y2="5"  stroke={AMBER_DARK} strokeWidth=".9"/>
                <line x1="5"  y1="5"  x2="5"  y2="27" stroke={AMBER_DARK} strokeWidth=".9"/>
                <line x1="49" y1="5"  x2="27" y2="5"  stroke={AMBER_DARK} strokeWidth=".9"/>
                <line x1="49" y1="5"  x2="49" y2="27" stroke={AMBER_DARK} strokeWidth=".9"/>
                <line x1="5"  y1="49" x2="27" y2="49" stroke={AMBER_DARK} strokeWidth=".9"/>
                <line x1="5"  y1="49" x2="5"  y2="27" stroke={AMBER_DARK} strokeWidth=".9"/>
                <line x1="49" y1="49" x2="27" y2="49" stroke={AMBER_DARK} strokeWidth=".9"/>
                <line x1="49" y1="49" x2="49" y2="27" stroke={AMBER_DARK} strokeWidth=".9"/>
                <line x1="5"  y1="5"  x2="27" y2="27" stroke={AMBER_DARK} strokeWidth=".9"/>
                <line x1="49" y1="5"  x2="27" y2="27" stroke={AMBER_DARK} strokeWidth=".9"/>
                <line x1="5"  y1="49" x2="27" y2="27" stroke={AMBER_DARK} strokeWidth=".9"/>
                <line x1="49" y1="49" x2="27" y2="27" stroke={AMBER_DARK} strokeWidth=".9"/>
              </pattern>
              <clipPath id="divClip"><rect x="0" y="0" width="180" height="252" rx="14" ry="14"/></clipPath>
            </defs>
            <rect x="0" y="0" width="180" height="252" rx="14" fill={AMBER}/>
            <rect x="0" y="0" width="180" height="252" fill="url(#divNet)" clipPath="url(#divClip)" opacity=".65"/>
            {/* White circle: cy=114 r=60 → y=54..174 */}
            <circle cx="90" cy="114" r="60" fill="white"/>
            {/* Starburst: centre at y=100. Top=78, bottom=122. Text gap=10 → y=132,148. Bot-pad=26 */}
            <g transform="translate(90,90)">
              <path d="M0,-22 L3,-3 L22,0 L3,3 L0,22 L-3,3 L-22,0 L-3,-3 Z" fill="#2D2D2D" opacity=".85"/>
              <line x1="-15" y1="-15" x2="-2" y2="-2" stroke="#2D2D2D" strokeWidth="2" opacity=".45" strokeLinecap="round"/>
              <line x1="15"  y1="-15" x2="2"  y2="-2" stroke="#2D2D2D" strokeWidth="2" opacity=".45" strokeLinecap="round"/>
              <line x1="15"  y1="15"  x2="2"  y2="2"  stroke="#2D2D2D" strokeWidth="2" opacity=".45" strokeLinecap="round"/>
              <line x1="-15" y1="15"  x2="-2" y2="2"  stroke="#2D2D2D" strokeWidth="2" opacity=".45" strokeLinecap="round"/>
            </g>
            <text x="90" y="132" textAnchor="middle" fontFamily="Helvetica,Arial,sans-serif" fontWeight="bold" fontSize="13" fill="#2D2D2D" letterSpacing="1">DIVERGENT</text>
            <text x="90" y="148" textAnchor="middle" fontFamily="Helvetica,Arial,sans-serif" fontWeight="bold" fontSize="13" fill="#2D2D2D" letterSpacing="1">THINKING</text>
          </svg>
        </div>
      );
    }

    function ReflectiveBack({ onClick }) {
      const [hov,setHov]=useState(false);
      return (
        <div onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
          style={{cursor:"pointer",borderRadius:14,transition:"transform .2s,box-shadow .2s",
            transform:hov?"scale(1.05) translateY(-5px)":"scale(1)",
            boxShadow:hov?"0 14px 36px rgba(30,90,106,.5)":"0 4px 18px rgba(0,0,0,.2)"}}>
          <svg width="200" height="280" viewBox="0 0 180 252" style={{display:"block",borderRadius:14}}>
            <defs>
              <pattern id="refWave" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
                <circle cx="30" cy="30" r="25" fill="none" stroke={TEAL_LIGHT} strokeWidth="1.2"/>
                <circle cx="30" cy="30" r="14" fill="none" stroke={TEAL_LIGHT} strokeWidth="1.2"/>
                <circle cx="30" cy="30" r="4"  fill="none" stroke={TEAL_LIGHT} strokeWidth="1.2"/>
                <path d="M0,15 Q15,15 15,30 Q15,45 30,45" fill="none" stroke={TEAL_LIGHT} strokeWidth="1.2"/>
                <path d="M60,15 Q45,15 45,30 Q45,45 30,45" fill="none" stroke={TEAL_LIGHT} strokeWidth="1.2"/>
              </pattern>
              <clipPath id="refClip"><rect x="0" y="0" width="180" height="252" rx="14" ry="14"/></clipPath>
            </defs>
            <rect x="0" y="0" width="180" height="252" rx="14" fill={TEAL}/>
            <rect x="0" y="0" width="180" height="252" fill="url(#refWave)" clipPath="url(#refClip)" opacity=".6"/>
            {/* White circle: cy=114 r=60 → y=54..174 */}
            <circle cx="90" cy="114" r="60" fill="white"/>
            {/* Rings r=20/13/6: centre y=100. Top=80, bottom=120. Text gap=12 → y=132,148. Bot-pad=26 */}
            <g transform="translate(90,90)">
              <circle r="20" fill="none" stroke="#2D2D2D" strokeWidth="2.2" opacity=".8"/>
              <circle r="13" fill="none" stroke="#2D2D2D" strokeWidth="2.2" opacity=".8"/>
              <circle r="6"  fill="none" stroke="#2D2D2D" strokeWidth="2.2" opacity=".8"/>
            </g>
            <text x="90" y="132" textAnchor="middle" fontFamily="Georgia,'Times New Roman',serif" fontSize="13" fill="#2D2D2D" letterSpacing="1">REFLECTIVE</text>
            <text x="90" y="148" textAnchor="middle" fontFamily="Georgia,'Times New Roman',serif" fontSize="13" fill="#2D2D2D" letterSpacing="1">THINKING</text>
          </svg>
        </div>
      );
    }

    function CardModal({ card, type, onDrawAnother, onClose }) {
      const color=type==="divergent"?AMBER:TEAL;
      const label=type==="divergent"?"Divergent Thinking":"Reflective Thinking";
      return (
        <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"white",borderRadius:16,maxWidth:440,width:"100%",overflow:"hidden",boxShadow:"0 24px 64px rgba(0,0,0,.35)",animation:"pop .22s ease"}}>
            <div style={{background:color,padding:"20px 24px 16px"}}>
              <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,.7)",letterSpacing:1.8,textTransform:"uppercase",marginBottom:5}}>{label}</div>
              <div style={{fontSize:22,fontWeight:"bold",color:"white",lineHeight:1.2}}>{card.title}</div>
            </div>
            <div style={{padding:"18px 24px 20px"}}>
              <p style={{margin:0,fontSize:14,color:"#444",lineHeight:1.6}}>{card.description}</p>
              <div style={{height:1,background:color,opacity:.3,margin:"14px 0"}}/>
              <p style={{margin:0,fontSize:13.5,color:"#555",lineHeight:1.7,fontStyle:"italic"}}>{card.prompt}</p>
            </div>
            <div style={{padding:"0 24px 24px",display:"flex",gap:10}}>
              <button onClick={onDrawAnother} style={{flex:1,padding:"12px 0",background:color,color:"white",border:"none",borderRadius:9,fontSize:14,fontWeight:600,cursor:"pointer"}}>Draw another</button>
              <button onClick={onClose} style={{flex:1,padding:"12px 0",background:"#EEEBE5",color:"#555",border:"none",borderRadius:9,fontSize:14,fontWeight:600,cursor:"pointer"}}>Put back</button>
            </div>
          </div>
          <style>{`@keyframes pop{from{opacity:0;transform:scale(.93) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}`}</style>
        </div>
      );
    }

    function App() {
      const [divQ,setDivQ]=useState(()=>shuffled(DIVERGENT_CARDS));
      const [refQ,setRefQ]=useState(()=>shuffled(REFLECTIVE_CARDS));
      const [drawn,setDrawn]=useState(null);
      function draw(type){
        if(type==="divergent"){
          const q=divQ.length>0?divQ:shuffled(DIVERGENT_CARDS);
          const[card,...rest]=q; setDivQ(rest.length===0?shuffled(DIVERGENT_CARDS):rest); setDrawn({card,type});
        }else{
          const q=refQ.length>0?refQ:shuffled(REFLECTIVE_CARDS);
          const[card,...rest]=q; setRefQ(rest.length===0?shuffled(REFLECTIVE_CARDS):rest); setDrawn({card,type});
        }
      }
      return (
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 20px"}}>
          <h1 style={{margin:0,fontSize:28,fontWeight:"bold",color:"#2D2D2D"}}>Question Coach Card Picker</h1>
          <p style={{margin:"10px 0 44px",fontSize:14,color:"#999"}}>Click the card deck for the QFT stage you are working on.</p>
          <div style={{display:"flex",gap:52,alignItems:"flex-start"}}>
            <div style={{textAlign:"center"}}>
              <DivergentBack onClick={()=>draw("divergent")}/>
              <p style={{margin:"12px 0 0",fontSize:12,color:"#bbb"}}>{divQ.length} of 9 remaining</p>
            </div>
            <div style={{textAlign:"center"}}>
              <ReflectiveBack onClick={()=>draw("reflective")}/>
              <p style={{margin:"12px 0 0",fontSize:12,color:"#bbb"}}>{refQ.length} of 9 remaining</p>
            </div>
          </div>
          {drawn&&<CardModal card={drawn.card} type={drawn.type} onDrawAnother={()=>draw(drawn.type)} onClose={()=>setDrawn(null)}/>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
